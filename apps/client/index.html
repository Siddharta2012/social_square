<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Social Square — Spazio sociale virtuale in pixel-art isometrica" />
    <title>Social Square</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #root {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #game-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #hud-root {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="game-container"></div>
      <div id="hud-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
