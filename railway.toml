# Build: shared -> client -> server. Client dist is served statically by the server.
[build]
buildCommand = "pnpm install && pnpm --filter shared build && pnpm --filter client build && pnpm --filter server build"

[deploy]
startCommand = "node apps/server/dist/index.js"
restartPolicyType = "on_failure"
healthcheckPath = "/api/ready"
healthcheckTimeout = 30
